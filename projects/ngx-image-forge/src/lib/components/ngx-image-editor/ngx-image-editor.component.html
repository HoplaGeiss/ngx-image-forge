<div class="workspace">
  <canvas
    #mainCanvas
    class="canvas"
    role="img"
    aria-label="Image editor canvas"
    (mousedown)="onMouseDown($event)"
    (mousemove)="onMouseMove($event)"
    (mouseup)="onMouseUp()"
    (mouseleave)="onMouseUp()"
    (touchstart)="onTouchStart($event)"
    (touchmove)="onTouchMove($event)"
    (touchend)="onTouchEnd()"
  ></canvas>

  @if (!isLoaded()) {
    <div class="placeholder" aria-live="polite">
      <span class="placeholder-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <path d="M21 15l-5-5L5 21"/>
        </svg>
      </span>
      <p>No image loaded</p>
    </div>
  }
</div>

<div class="toolbar" role="toolbar" aria-label="Image editing controls">
  <div class="toolbar-section">
    <span class="toolbar-label">Rotate</span>
    <div class="toolbar-group" role="group" aria-label="Rotate">
      <button
        type="button"
        class="btn"
        (click)="rotate(-90)"
        title="Rotate 90° counter-clockwise"
        aria-label="Rotate 90° counter-clockwise"
      >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20" aria-hidden="true">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
          <path d="M3 3v5h5"/>
        </svg>
      </button>

      <button
        type="button"
        class="btn"
        (click)="rotate(90)"
        title="Rotate 90° clockwise"
        aria-label="Rotate 90° clockwise"
      >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20" aria-hidden="true">
          <path d="M21 12a9 9 0 1 1-9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
          <path d="M21 3v5h-5"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="toolbar-section">
    <span class="toolbar-label">Flip</span>
    <div class="toolbar-group" role="group" aria-label="Flip">
      <button
        type="button"
        class="btn"
        (click)="flipHorizontal()"
        title="Flip horizontal"
        aria-label="Flip horizontal"
      >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20" aria-hidden="true">
          <path d="M12 3v18M3 9l9-6 9 6M3 15l9 6 9-6" opacity=".4"/>
          <line x1="12" y1="3" x2="12" y2="21"/>
          <polyline points="6 9 12 3 18 9"/>
        </svg>
      </button>

      <button
        type="button"
        class="btn"
        (click)="flipVertical()"
        title="Flip vertical"
        aria-label="Flip vertical"
      >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20" aria-hidden="true">
          <path d="M3 12h18M9 3l6 9-6 9M15 3l-6 9 6 9" opacity=".4"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <polyline points="9 6 3 12 9 18"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="toolbar-section toolbar-section--stretch">
    <span class="toolbar-label">Angle</span>
    <div class="rotation-group" role="group" aria-label="Free rotation">
      <label for="ngx-rotation-slider" class="rotation-label">
        {{ sliderRotation() | number:'1.0-1' }}°
      </label>
      <input
        id="ngx-rotation-slider"
        type="range"
        class="slider"
        min="-180"
        max="180"
        step="0.5"
        [value]="sliderRotation()"
        (input)="onSliderInput($event)"
        aria-label="Rotation angle"
        [attr.aria-valuenow]="sliderRotation()"
        aria-valuemin="-180"
        aria-valuemax="180"
      />
    </div>
  </div>

  <button
    type="button"
    class="btn btn--reset"
    (click)="reset()"
    title="Reset to original"
    aria-label="Reset image to original state"
  >
    Reset
  </button>
</div>
