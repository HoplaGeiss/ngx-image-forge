<div class="demo-layout">
  <header class="demo-header">
    <div class="demo-header__left">
      <h1 class="demo-title">
        <span class="demo-title__icon" aria-hidden="true">🔬</span>
        ngx-image-forge
      </h1>
      <p class="demo-subtitle">Zero-dependency Angular image editor · Signals-native · Canvas API</p>
    </div>
    <nav class="demo-header__links" aria-label="Project links">
      <a href="https://github.com/HoplaGeiss/ngx-image-forge" class="demo-header__link" target="_blank" rel="noopener noreferrer" aria-label="GitHub repository">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true">
          <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.02 10.02 0 0 0 22 12.017C22 6.484 17.522 2 12 2Z"/>
        </svg>
        GitHub
      </a>
      <a href="https://www.npmjs.com/package/ngx-image-forge" class="demo-header__link" target="_blank" rel="noopener noreferrer" aria-label="npm package">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true">
          <path d="M1.763 0C.786 0 0 .786 0 1.763v20.474C0 23.214.786 24 1.763 24h20.474c.977 0 1.763-.786 1.763-1.763V1.763C24 .786 23.214 0 22.237 0zM5.13 5.323l13.837.019-.009 13.836h-3.464l.01-10.382h-3.456L12.04 19.17H5.113z"/>
        </svg>
        npm
      </a>
    </nav>
  </header>

  <!-- ── Tab bar ──────────────────────────────────────────────────────────── -->
  <div class="demo-tabs" role="tablist" aria-label="Demo sections">
    <button
      role="tab"
      class="demo-tab"
      [class.demo-tab--active]="activeTab() === 'playground'"
      [attr.aria-selected]="activeTab() === 'playground'"
      (click)="activeTab.set('playground')"
    >
      <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <path d="M3 9h18M9 21V9"/>
      </svg>
      Playground
    </button>
    <button
      role="tab"
      class="demo-tab"
      [class.demo-tab--active]="activeTab() === 'profile'"
      [attr.aria-selected]="activeTab() === 'profile'"
      (click)="activeTab.set('profile')"
    >
      <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
      Profile Editor
    </button>
  </div>

  @if (activeTab() === 'playground') {
    <app-playground />
  }

  @if (activeTab() === 'profile') {
    <app-profile-editor />
  }
</div>
